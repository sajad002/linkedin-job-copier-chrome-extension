<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LinkedIn Job Copier</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <h1>LinkedIn Job Copier</h1>
    <p class="hint">Open a LinkedIn Jobs search page, then choose what to copy for GPT analysis.</p>

    <button id="copyList" type="button">Copy positions list</button>
    <button id="copyDetails" type="button">Copy open position info</button>
    <button id="removeListed" class="danger" type="button">Remove listed positions</button>
    <button id="copySafeNames" class="secondary" type="button">Copy open company + title</button>

    <div class="prompt-row">
      <label class="checkbox-row">
        <input id="includePrompt" type="checkbox" />
        Add GPT analysis prompt
      </label>
      <button id="editPrompts" class="small secondary" type="button">Edit prompt</button>
    </div>

    <section id="promptEditor" class="prompt-editor" hidden>
      <label>
        List prompt
        <textarea id="listPrompt" rows="5"></textarea>
      </label>
      <label>
        Open position prompt
        <textarea id="detailsPrompt" rows="5"></textarea>
      </label>
      <div class="button-row">
        <button id="savePrompts" class="small" type="button">Save prompts</button>
        <button id="resetPrompts" class="small secondary" type="button">Reset defaults</button>
      </div>
    </section>

    <div id="status" role="status" aria-live="polite"></div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
